<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Story ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="netflixSound">
    <source src="Netflix New Logo Animation 2019.mp3" type="audio/mpeg">
</audio>

<!-- 🎬 NETFLIX CINEMA -->
<section id="cinema" class="active">

    <div class="netflixScene">
        <div class="netflixFlare"></div>

        <div class="netflixN">N</div>
        <div class="netflixLogo">NETFLIX</div>

        <div class="netflixText">
            <p>A ORIGINAL SERIES</p>
            <h2>First Chapter</h2>
            <p>A Love Story Begins ❤️</p>
        </div>

    </div>
</section>

<!-- 💖 INTRO -->
<section id="intro">
    <div id="story"></div>

    <img class="cat" src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">
</section>

<!-- 🔑 PASSWORD -->
<section id="password">
    <h2>Enter Our Special Word 💖</h2>
    <input type="password" id="passInput">
    <button onclick="checkPass()">Unlock</button>
</section>

<!-- 🎮 GAME -->
<section id="game">
    <h2>Catch 5 Hearts 💖</h2>
    <h3 id="score">0 / 5</h3>
</section>

<!-- 📸 SLIDESHOW -->
<section id="slideshow">
    <h2>Our Memories 💕</h2>

    <div class="imgBox">
        <img id="slide">
        <div id="caption"></div>
    </div>

    <button onclick="nextSlide()">Next ➡️</button>
</section>

<!-- 💌 FINAL -->
<section id="final">
    <h1>Happy 1 Month of Our Relationship ❤️</h1>
    <p id="typedText"></p>
</section>

<script src="script.js"></script>
</body>
</html>
